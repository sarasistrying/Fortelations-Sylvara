            <option value="men">Putra</option>

        <div class="day-selection">

          <select id="date" onchange="showMatches()">
            <option value="2026-09-23">23 Sept</option>

      <script>
        const matches = {
          men: {
            '2026-09-23': [
              { teamA: 'SMAK PENABUR Bintaro Jaya', teamB: 'SMAK PENABUR Harapan Indah', scoreA: 8, scoreB:2  },
              { teamA: 'SMAK PENABUR Bintaro Jaya', teamB: 'SMA Santo Antonius', scoreA: 4, scoreB:0  },
              { teamA: 'SMAK PENABUR Harapan Indah', teamB: 'SMA Santo Antonius', scoreA: 2, scoreB:6  },
              ],
            '2026-09-24': [
            { teamA: 'SMA Don Bosco 1', teamB: 'SMAK PENABUR Summarecon Bekasi', scoreA: 2, scoreB: 0 },
              { teamA: 'SMK Telkom ', teamB: 'SMAK 7 PENABUR', scoreA: 4, scoreB: 0 },
              { teamA: 'SMA Don Bosco 1', teamB: 'SMAK PENABUR Kota Wisata', scoreA: 4, scoreB: 2},
              { teamA: 'SMK Telkom', teamB: 'SMA Marie Joseph ', scoreA: 2, scoreB: 4 },
              { teamA: 'SMAK PENABUR Kota Wisata', teamB: 'SMAK PENABUR Summarecon Bekasi ', scoreA: 1, scoreB: 0 },
              { teamA: 'SMA Marie Joseph', teamB: 'SMAK 7 PENABUR', scoreA: 6, scoreB: 0 },        ],
            '2026-09-25': [
              { teamA: 'SMK Telkom', teamB: 'SMAK PENABUR Kota Wisata', scoreA: 5, scoreB: 0 },
              { teamA: 'SMA Marie Joseph', teamB: 'SMA Don Bosco 1', scoreA: 4, scoreB: 1 },
              { teamA: 'SMA Santo Antonius (Semifinal)', teamB: 'SMK Telkom', scoreA: 0, scoreB: 4 },
              { teamA: 'SMA Marie Joseph (Semifinal)', teamB: 'SMAK PENABUR Bintaro Jaya', scoreA: 4, scoreB: 2 },
              { teamA: 'SMA Santo Antonius (Third Place Match)', teamB: 'SMAK PENABUR Bintaro Jaya', scoreA: 2, scoreB: 4 },
              { teamA: 'SMK Telkom (Final)', teamB: 'SMA Marie Joseph', scoreA: 2, scoreB: 0 },
            ],
          },

        };

        function showMatches() {
          const category = document.getElementById('category').value;
          const date = document.getElementById('date').value;
          const matchList = document.getElementById('match-list');
          matchList.innerHTML = ''; // Clear previous matches

          if (!matches[category] || !matches[category][date]) {
            matchList.innerHTML = '<p>Match belum tersedia.</p>';
            return;
          }

          matches[category][date].forEach(match => {
            const matchElement = document.createElement('div');
            matchElement.className = 'match';
            matchElement.innerHTML = `
              <div class="team">${match.teamA}</div>
              <div class="score">${match.scoreA} - ${match.scoreB}</div>
              <div class="team">${match.teamB}</div>
            `;
            matchList.appendChild(matchElement);
          });
        }

        // Initially show the matches for the first day and first category
        showMatches();
      </script>
