  <style>
    /* ============================================================
       COMPETITIONS — HALL OF FAME GRID
       Mirrors the landonorris.com helmet-wall layout: a wide grid
       of tiles arranged in columns, each column drifting at a
       different vertical speed as the page scrolls. Built to sit
       on top of the site's existing background (no new background
       is introduced here — it inherits whatever #main/body uses).
       ============================================================ */

    .competitions-hero {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 160px 20px 60px;
      position: relative;
      z-index: 2;
    }

    .competitions-hero h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: clamp(40px, 8vw, 96px);
      color: #FCDD8B;
      text-shadow: 0 0 15px #B8BE49, 0 0 40px rgba(239, 157, 109, 0.4);
      letter-spacing: 2px;
      margin: 0 0 16px;
      text-transform: uppercase;
    }

    .competitions-hero p {
      font-family: 'Open Sans', sans-serif;
      font-size: clamp(14px, 2vw, 19px);
      color: rgba(255, 255, 255, 0.75);
      max-width: 620px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .hof-wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
      overflow: hidden;
      padding: 0 0 160px;
    }

    .hof-grid {
      display: flex;
      justify-content: center;
      gap: clamp(10px, 2vw, 28px);
      max-width: 1500px;
      margin: 0 auto;
      padding: 0 20px;
      align-items: flex-start;
    }

    .hof-column {
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 2vw, 28px);
      flex: 1 1 0;
      will-change: transform;
    }

    /* stagger starting offsets so columns don't line up horizontally —
       this is what gives the "hall of fame wall" feel before scroll JS
       even kicks in */
    .hof-column:nth-child(2) { margin-top: clamp(40px, 6vw, 90px); }
    .hof-column:nth-child(3) { margin-top: clamp(80px, 10vw, 160px); }
    .hof-column:nth-child(4) { margin-top: clamp(20px, 4vw, 50px); }
    .hof-column:nth-child(5) { margin-top: clamp(110px, 12vw, 200px); }

    .hof-tile {
      position: relative;
      aspect-ratio: 1 / 1;
      width: 100%;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .hof-tile img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.55));
      transition: filter 0.35s ease, transform 0.35s ease;
    }

    .hof-tile:hover img,
    .hof-tile:focus-visible img {
      filter: drop-shadow(0 0 22px rgba(184, 190, 73, 0.65)) drop-shadow(0 14px 22px rgba(0, 0, 0, 0.6));
      transform: scale(1.04);
    }

    .hof-tile-label {
      position: absolute;
      left: 50%;
      bottom: -6px;
      transform: translate(-50%, 0);
      width: 86%;
      text-align: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: clamp(11px, 1.3vw, 14px);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #FCDD8B;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.85), 0 0 14px rgba(0, 0, 0, 0.6);
      opacity: 0;
      transition: opacity 0.3s ease, bottom 0.3s ease;
      pointer-events: none;
    }

    .hof-tile:hover .hof-tile-label,
    .hof-tile:focus-visible .hof-tile-label {
      opacity: 1;
      bottom: -26px;
    }

    /* Detail panel that opens when a stone is selected */
    .hof-detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 14, 8, 0.78);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 24px;
    }

    .hof-detail-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .hof-detail-card {
      background: rgba(20, 26, 16, 0.92);
      border: 2px solid rgba(184, 190, 73, 0.45);
      border-radius: 24px;
      max-width: 480px;
      width: 100%;
      padding: 36px 32px 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      transform: translateY(24px) scale(0.96);
      transition: transform 0.35s ease;
    }

    .hof-detail-overlay.active .hof-detail-card {
      transform: translateY(0) scale(1);
    }

    .hof-detail-card img {
      width: clamp(140px, 30vw, 200px);
      height: auto;
      margin: 0 auto 20px;
      filter: drop-shadow(0 0 26px rgba(184, 190, 73, 0.5));
      display: block;
    }

    .hof-detail-card h3 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: clamp(22px, 4vw, 30px);
      color: #FCDD8B;
      text-shadow: 0 0 15px #B8BE49;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0 0 10px;
    }

    .hof-detail-card p {
      font-family: 'Open Sans', sans-serif;
      color: rgba(255, 255, 255, 0.8);
      font-size: 15px;
      line-height: 1.6;
      margin: 0;
    }

    .hof-detail-close {
      position: absolute;
      top: 14px;
      right: 18px;
      background: none;
      border: none;
      color: #FCDD8B;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      opacity: 0.8;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .hof-detail-close:hover {
      opacity: 1;
      transform: scale(1.1);
    }

    @media (max-width: 900px) {
      .hof-grid { gap: 14px; }
      .hof-column:nth-child(2),
      .hof-column:nth-child(3),
      .hof-column:nth-child(4),
      .hof-column:nth-child(5) {
        margin-top: clamp(20px, 6vw, 60px);
      }
    }

    @media (max-width: 600px) {
      .hof-grid {
        gap: 10px;
      }
      .hof-tile-label { display: none; }
    }

  <script>
    /* ============================================================
       COMPETITIONS DATA
       filename -> { label, desc }
       Edit this list to add/remove/rename competitions; the grid
       and detail popups are generated entirely from this array.
       ============================================================ */
    const COMPETITIONS = [
      { file: "Band",           label: "Band",                desc: "Bands bring full-stage energy, battling it out for the loudest cheer in the house." },
      { file: "VocalGroup",     label: "Vocal Group",         desc: "Harmonies collide as vocal ensembles take the stage together." },
      { file: "SoloSinging",    label: "Solo Singing",        desc: "One voice, one stage — solo singers go all in for the spotlight." },
      { file: "Monolog",        label: "Monolog",             desc: "A single performer, a single story, told with everything they've got." },
      { file: "MembacaPuisi",   label: "Membaca Puisi",       desc: "Poetry reading competition celebrating rhythm, emotion, and delivery." },
      { file: "EnglishSpeech",  label: "English Speech",      desc: "Speakers take the floor to persuade, inform, and inspire in English." },
      { file: "MUN",            label: "MUN",                 desc: "Model United Nations — delegates debate global issues with diplomacy and wit." },
      { file: "Chess",          label: "Chess",               desc: "Sixty-four squares, endless strategy. May the sharpest mind win." },
      { file: "MD",             label: "Mobile Dev",          desc: "Builders and coders compete to ship the sharpest mobile creations." },
      { file: "ML",             label: "Mobile Legends",      desc: "Squads clash in Mobile Legends: Bang Bang for esports glory." },
      { file: "Basket",         label: "Basketball",          desc: "Fast breaks, full courts, and the chase for the winning basket." },
      { file: "Futsal",         label: "Futsal",              desc: "Five-a-side football at full speed in a tighter, faster arena." },
      { file: "Floorball",      label: "Floorball",           desc: "Fast sticks and faster feet — floorball brings the floor to life." },
      { file: "Bulutangkis",    label: "Bulutangkis",         desc: "Badminton rallies test reflex, footwork, and nerve." },
      { file: "Photography",   label: "Photography",         desc: "Capturing the moment, one frame at a time." },
      { file: "Drawing",        label: "Drawing",             desc: "Traditional drawing competition showcasing raw artistic skill." },
      { file: "DigitalDrawing", label: "Digital Drawing",     desc: "Tablets and styluses replace pencils in this digital art showdown." },
      { file: "MonSoonSim",     label: "MonSoonSim",          desc: "A business simulation competition testing strategy under pressure." },
      { file: "CCA",            label: "CCA",                 desc: "Cross-category showcase honoring Sylvara's extracurricular spirit." },
    ];

    const NUM_COLUMNS = window.innerWidth <= 900 ? 3 : 5;

    function buildGrid() {
      const grid = document.getElementById('hofGrid');
      grid.innerHTML = '';

      const columns = [];
      for (let i = 0; i < NUM_COLUMNS; i++) {
        const col = document.createElement('div');
        col.className = 'hof-column';
        grid.appendChild(col);
        columns.push(col);
      }

      COMPETITIONS.forEach((comp, i) => {
        const col = columns[i % NUM_COLUMNS];

        const tile = document.createElement('button');
        tile.className = 'hof-tile';
        tile.type = 'button';
        tile.setAttribute('aria-label', comp.label);
        tile.dataset.index = i;

        const img = document.createElement('img');
        img.src = `assets/img/Stone/${comp.file}.png`;
        img.alt = comp.label;
        img.loading = 'lazy';

        const label = document.createElement('span');
        label.className = 'hof-tile-label';
        label.textContent = comp.label;

        tile.appendChild(img);
        tile.appendChild(label);
        col.appendChild(tile);

        tile.addEventListener('click', () => openDetail(comp));
      });

      return columns;
    }

    function openDetail(comp) {
      document.getElementById('hofCardImg').src = `assets/img/Stone/${comp.file}.png`;
      document.getElementById('hofCardImg').alt = comp.label;
      document.getElementById('hofCardTitle').textContent = comp.label;
      document.getElementById('hofCardDesc').textContent = comp.desc;
      document.getElementById('hofOverlay').classList.add('active');
    }

    function closeDetail() {
      document.getElementById('hofOverlay').classList.remove('active');
    }

    document.getElementById('hofClose').addEventListener('click', closeDetail);
    document.getElementById('hofOverlay').addEventListener('click', (e) => {
      if (e.target.id === 'hofOverlay') closeDetail();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeDetail();
    });

    let hofColumns = buildGrid();

    /* ============================================================
       SCROLL-DRIVEN COLUMN PARALLAX
       Each column gets its own speed/direction so the wall feels
       alive while scrolling, like the helmet wall reference.
       ============================================================ */
    const lenis = new Lenis({ lerp: 0.15, wheelMultiplier: 1.82 });
    window.lenis = lenis;

    gsap.registerPlugin(ScrollTrigger);

    const columnSpeeds = [0.18, -0.28, 0.35, -0.2, 0.3];
    const setters = [];

    function refreshSetters() {
      setters.length = 0;
      hofColumns.forEach((col) => {
        setters.push(gsap.quickSetter(col, "y", "px"));
      });
    }
    refreshSetters();

    lenis.on('scroll', () => ScrollTrigger.update());

    // Per-column offset is computed relative to when the grid enters the
    // viewport (not raw absolute scrollY), so the effect is consistent
    // no matter where the section sits on the page.
    const hofWrapper = document.querySelector('.hof-wrapper');

    function updateColumnParallax() {
      const rect = hofWrapper.getBoundingClientRect();
      const vh = window.innerHeight;
      // progress: 0 when section top is at bottom of viewport, 1 when
      // section bottom passes the top of viewport
      const total = rect.height + vh;
      const progress = Math.min(1, Math.max(0, (vh - rect.top) / total));

      hofColumns.forEach((col, i) => {
        const speed = columnSpeeds[i % columnSpeeds.length];
        const offset = (progress - 0.5) * 220 * speed;
        setters[i](offset);
      });
    }

    lenis.on('scroll', updateColumnParallax);
    window.addEventListener('resize', () => {
      updateColumnParallax();
    });
    updateColumnParallax();

    gsap.ticker.add((time) => {
      lenis.raf(time * 1000);
    });

    // Rebuild grid (column count) responsively on resize/orientation change
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        const newCount = window.innerWidth <= 900 ? 3 : 5;
        if (newCount !== hofColumns.length) {
          location.reload();
        }
      }, 300);
    });
  </script>
