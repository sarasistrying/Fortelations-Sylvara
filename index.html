<script>
    // Countdown Timer Logic
    function startCountdown() {
      const countdownDate = new Date("September 12, 2026 06:00:00").getTime();
      
      function updateCountdown() {
        const now = new Date().getTime();
        const distance = countdownDate - now;
        
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);
        
        document.getElementById("days").textContent = String(days).padStart(2, '0');
        document.getElementById("hours").textContent = String(hours).padStart(2, '0');
        document.getElementById("minutes").textContent = String(minutes).padStart(2, '0');
        document.getElementById("seconds").textContent = String(seconds).padStart(2, '0');
        
        if (distance < 0) {
          document.getElementById("days").textContent = "00";
          document.getElementById("hours").textContent = "00";
          document.getElementById("minutes").textContent = "00";
          document.getElementById("seconds").textContent = "00";
        }
      }
      
      updateCountdown();
      setInterval(updateCountdown, 1000);
    }
    
    startCountdown();

    `;
    document.head.appendChild(style);

    const lenis = new Lenis({ lerp: 0.15, wheelMultiplier: 1.82 })
    window.lenis = lenis

  const setGedungLeft = gsap.quickSetter(".gedungleft", "x", "px");
  const setGedungRight = gsap.quickSetter(".gedungright", "x", "px");
  const setResplendent = gsap.quickSetter(".resplendent", "y", "px");

  lenis.on('scroll', (e) => {
    ScrollTrigger.update()
    const y = window.scrollY;
    setGedungLeft(-y * 0.3);
    setGedungRight(y * 0.3);
    setResplendent(y * 0.2);
  })

  gsap.ticker.add((time)=>{
    lenis.raf(time * 1000)
  })

  let countdownLock = 0;
  let lockThrottle = false;
  let aboutTopY = 0;
  let isLocking = false;
  const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  if (!isTouchDevice) {
    lenis.on('scroll', (e) => {
      const about = document.querySelector('#about');
      if (!about) return;
      const rect = about.getBoundingClientRect();
      if (rect.top <= 0 && rect.bottom > 0 && e.direction > 0) {
        if (countdownLock < 3) {
          if (!isLocking) {
            isLocking = true;
            aboutTopY = window.scrollY + rect.top;
          }
          if (!lockThrottle) {
            lockThrottle = true;
            countdownLock++;
            setTimeout(() => lockThrottle = false, 400);
          }
          if (window.scrollY > aboutTopY + 1) {
            lenis.scrollTo(aboutTopY, { immediate: true });
          }
        } else {
          isLocking = false;
        }
      } else {
        countdownLock = 0;
        isLocking = false;
      }
    });
  }
